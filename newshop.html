<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ товара — Быстрая доставка</title>
    <style>
        /* Стиль оформления сайта */
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; line-height: 1.6; }
        header { background: #2c3e50; color: white; padding: 60px 20px; text-align: center; }
        .container { max-width: 600px; margin: -50px auto 50px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { margin: 0 0 10px; font-size: 28px; }
        p { color: #666; margin-bottom: 30px; }
        
        /* Стили формы */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #3498db; outline: none; }
        
        .btn { display: block; width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #219150; }
        .btn:disabled { background: #95a5a6; cursor: not-allowed; }

        footer { text-align: center; font-size: 12px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>Оформление заказа</h1>
        <p>Заполните форму, и мы свяжемся с вами!</p>
    </header>

    <div class="container">
        <form id="orderForm">
            <div class="form-group">
                <label for="name">Ваше имя:</label>
                <input type="text" id="name" placeholder="Например, Иван" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Номер телефона:</label>
                <input type="tel" id="phone" placeholder="+7 (___) ___-__-__" required>
            </div>

            <button type="submit" id="submitBtn" class="btn">ОТПРАВИТЬ ЗАЯВКУ</button>
        </form>
    </div>

    <footer>
        © 2026 Продажа товаров. Все данные защищены.
    </footer>

    <script>
        document.getElementById('orderForm').addEventListener('submit', function(event) {
            event.preventDefault();

            // ВАШИ ДАННЫЕ (УЖЕ ВСТАВЛЕНЫ)
            const token = '8548221733:AAEYg2Ior5liQrnAMn10Q3x2PDhnD-GIwjk';
            const chat_id = '615411798';
            
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const btn = document.getElementById('submitBtn');

            // Текст сообщения
            const message = `🚀 НОВЫЙ ЗАКАЗ!\n\n👤 Имя: ${name}\n📞 Телефон: ${phone}`;

            // Ссылка API
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;

            // Блокируем кнопку
            btn.innerText = 'ОТПРАВЛЯЕМ...';
            btn.disabled = true;

            fetch(url)
            .then(response => {
                if (response.ok) {
                    alert('Успешно! Ваша заявка отправлена. Проверьте Telegram!');
                    document.getElementById('orderForm').reset();
                } else {
                    alert('Ошибка! Проверьте, запустили ли вы бота в Telegram.');
                }
            })
            .catch(error => {
                alert('Ошибка сети. Попробуйте еще раз.');
            })
            .finally(() => {
                btn.innerText = 'ОТПРАВИТЬ ЗАЯВКУ';
                btn.disabled = false;
            });
        });
    </script>

</body>
</html>
